<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon.png"
      media="(prefers-color-scheme: light)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>ADMIN DASHBOARD</title>
    <meta name="title" content="Vite Admin Dashboard" />
    <meta
      name="description"
      content="Admin Dashboard UI built with Shadcn and Vite."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" />
    <meta property="og:title" content="Shadcn Admin" />
    <meta
      property="og:description"
      content="Admin Dashboard UI built with Shadcn and Vite."
    />
    <meta property="og:image" content="" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="" />
    <meta property="twitter:title" content="Shadcn Admin" />
    <meta
      property="twitter:description"
      content="Admin Dashboard UI built with Shadcn and Vite."
    />
    <meta property="twitter:image" content="" />

    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />

    <meta name="theme-color" content="#fff" />
    <script>
      ;(() => {
        try {
          const raw =
            localStorage.getItem('runtime-theme:admin') ||
            localStorage.getItem('runtime-theme:current')
          const theme = raw ? JSON.parse(raw) : null
          const preference =
            document.cookie
              .split('; ')
              .find((row) => row.startsWith('vite-ui-theme='))
              ?.split('=')[1] || 'system'
          const mode =
            preference === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : preference

          document.documentElement.classList.remove('light', 'dark')
          document.documentElement.classList.add(mode)

          if (!theme?.styles?.[mode]) return

          const requiredKeys = [
            'background',
            'foreground',
            'card',
            'card-foreground',
            'popover',
            'popover-foreground',
            'primary',
            'primary-foreground',
            'secondary',
            'secondary-foreground',
            'muted',
            'muted-foreground',
            'accent',
            'accent-foreground',
            'destructive',
            'border',
            'input',
            'ring',
            'chart-1',
            'chart-2',
            'chart-3',
            'chart-4',
            'chart-5',
            'sidebar',
            'sidebar-foreground',
            'sidebar-primary',
            'sidebar-primary-foreground',
            'sidebar-accent',
            'sidebar-accent-foreground',
            'sidebar-border',
            'sidebar-ring',
            'font-sans',
            'font-serif',
            'font-mono',
            'radius',
            'shadow-color',
            'shadow-opacity',
            'shadow-blur',
            'shadow-spread',
            'shadow-offset-x',
            'shadow-offset-y',
            'letter-spacing',
            'spacing',
          ]

          if (
            !requiredKeys.every(
              (key) => typeof theme.styles[mode][key] === 'string'
            )
          ) {
            localStorage.removeItem('runtime-theme:admin')
            localStorage.removeItem('runtime-theme:current')
            return
          }

          Object.entries(theme.styles[mode]).forEach(([key, value]) => {
            document.documentElement.style.setProperty(`--${key}`, value)
          })
        } catch {}
      })()
    </script>
  </head>

  <body>
    <div id="root"></div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
